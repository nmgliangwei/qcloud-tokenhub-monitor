# ============================================
# 腾讯云 TokenPlan 监控配置文件
# ============================================

# 腾讯云 API 凭证
# 获取方式：https://console.cloud.tencent.com/cam/capi
tencent_cloud:
  secret_id: "your-secret-id"
  secret_key: "your-secret-key"
  region: "ap-guangzhou"          # 地域，如 ap-guangzhou / ap-beijing / ap-shanghai

# 企业微信群机器人 Webhook
# 获取方式：企微群 → 右上角群设置 → 群机器人 → 添加机器人 → 复制 Webhook 地址
# 告警关闭时（alert.enabled=false）可不配置
wecom_webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your-bot-key"

# 告警配置
alert:
  # 是否启用企微告警通知
  # true  - 通过企业微信群机器人发送告警（需配置 wecom_webhook）
  # false - 关闭告警，仅暴露 Prometheus 指标，由 Alertmanager 负责告警
  enabled: true

# 监控阈值配置（按使用率百分比，从高到低匹配）
# 当套餐额度使用率达到对应阈值时触发告警
# 同一套餐在同一个告警冷却周期内只会触发一次最高级别的告警
thresholds:
  - level: "critical"        # 严重告警
    usage_percent: 90        # 使用率 >= 95%
    message: "额度使用率>=90%，请立即处理！"
  - level: "warning"         # 警告
    usage_percent: 80        # 使用率 >= 80%
    message: "额度使用率>=80%，请关注。"
#  - level: "notice"          # 提醒
#    usage_percent: 50        # 使用率 >= 50%
#    message: "额度使用过半，请注意。"

# 告警冷却时间（分钟）
# 同一套餐在冷却时间内达到同一告警级别，不会重复发送
alert_cooldown_minutes: 60

# 是否对已耗尽额度的套餐（StopReason=EXHAUSTED）发送告警
alert_on_exhausted: true

# 检测周期配置
schedule:
  # cron 表达式，以下示例为每 30 分钟执行一次
  # 分钟  小时  日  月  周
  cron: "*/30 * * * *"
  # 也可以用 interval 方式（二选一，cron 优先）
  # interval_minutes: 30

# 日志配置
logging:
  level: "INFO"               # DEBUG / INFO / WARNING / ERROR
  file: "/app/logs/monitor.log"    # 日志文件路径，留空则不写文件
  max_size_mb: 10             # 单个日志文件最大大小
  backup_count: 5             # 保留日志文件数量

# Prometheus 指标暴露配置
metrics:
  enabled: true               # 是否启用 Prometheus metrics
  addr: "0.0.0.0"             # 监听地址
  port: 9100                  # 监听端口，访问 /metrics 获取指标
  # metrics 指标刷新周期（分钟），独立于告警检测周期 schedule
  # 腾讯云 API 限制 20 次/秒，每个套餐每次刷新需调用 1 + len(usage_dimensions) 次 API
  # 建议不低于 3 分钟，默认 5 分钟
  refresh_interval_minutes: 5
  # 用量排行维度，支持: apikey / model / endpoint
  # 每个维度会额外调用 DescribeUsageRankList API
  usage_dimensions: ["apikey", "model"]
  # 用量统计时间范围，支持以下格式:
  #   固定标识:
  #     today          - 今天 0:00 到当前时刻
  #     yesterday      - 昨天 0:00 到今天 0:00（完整自然日）
  #     last_7_days    - 7 天前 0:00 到当前时刻
  #     last_30_days   - 30 天前 0:00 到当前时刻
  #     current_cycle  - 默认取最近 30 天（30 天前 0:00 到当前时刻）
  #   相对小时（滚动窗口，从 N 小时前到当前时刻）:
  #     last_Nh        - N 为任意正整数，如 last_1h, last_6h, last_12h, last_24h
  #   相对天数（滚动窗口，从 N 天前同一时刻到当前时刻）:
  #     last_Nd        - N 为任意正整数，如 last_1d, last_3d, last_14d
  # 注意:
  #   - N 为任意正整数，代码层面无上限
  #   - 腾讯云 API 限制最大时间跨度 90 天，超出会返回 PeriodExceedsSpan 错误
  #   - 用量排行为账户级别查询，不区分套餐，指标中 team_id="account"、plan_name="all"
  usage_period: "current_cycle"
